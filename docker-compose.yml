version: "3.9"

networks:
  frontend:
  backend:

services:

  app:
    build: ./app
    networks:
      - backend
  nginx1:
    image: nginx:alpine
    volumes:
      - ./nginx1/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"
    networks:
      - frontend
      - backend
    depends_on:
      - app

  nginx2:
    image: nginx:alpine
    volumes:
      - ./nginx2/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8082:80"
    networks:
      - frontend
      - backend
    depends_on:
      - app

  nginx3:
    image: nginx:alpine
    volumes:
      - ./nginx3/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    depends_on:
      - app
